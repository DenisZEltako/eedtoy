name: Finalize and build EEDTOY v1.0.82

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/finalize-v1.0.82.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Quellen auf v1.0.82 aktualisieren
        shell: bash
        run: |
          cat > /tmp/prepare_v1082.py <<'PY'
          from pathlib import Path
          import json
          import re
          import subprocess

          ROOT = Path('.')

          def read(path: str) -> str:
              return (ROOT / path).read_text(encoding='utf-8')

          def write(path: str, text: str) -> None:
              (ROOT / path).write_text(text, encoding='utf-8', newline='\n')
              print(f'updated {path}')

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              if old not in text:
                  raise RuntimeError(f'Muster fehlt: {label}')
              return text.replace(old, new, 1)

          def replace_region(text: str, start: str, end: str, replacement: str, label: str) -> str:
              start_index = text.find(start)
              if start_index < 0:
                  raise RuntimeError(f'Startmarke fehlt: {label}')
              end_index = text.find(end, start_index + len(start))
              if end_index < 0:
                  raise RuntimeError(f'Endmarke fehlt: {label}')
              return text[:start_index] + replacement + text[end_index:]

          # ----------------------------------------------------------
          # React-Oberfläche
          # ----------------------------------------------------------
          app_path = 'src/App.jsx'
          app = read(app_path)
          app, count = re.subn(r'const APP_VERSION = "[^"]+";', 'const APP_VERSION = "1.0.82";', app, count=1)
          if count != 1:
              raise RuntimeError('APP_VERSION konnte nicht gesetzt werden')

          gateway_start = app.find('const GATEWAY_TYPES = [')
          gateway_end = app.find('\n];', gateway_start)
          if gateway_start < 0 or gateway_end < 0:
              raise RuntimeError('GATEWAY_TYPES-Block nicht gefunden')
          gateway_block = app[gateway_start:gateway_end + 3]
          gateway_lines = []
          for line in gateway_block.splitlines():
              if 'value:"usb300"' in line:
                  continue
              if 'value:"fgw14usb"' in line:
                  line = line.replace('proto:"esp2"', 'proto:"fgw14-python"')
              gateway_lines.append(line)
          new_gateway_block = '\n'.join(gateway_lines)
          app = app[:gateway_start] + new_gateway_block + app[gateway_end + 3:]

          detect_base = '''  const handleDetectBaseId = async () => {
            if (!isElectron) return;
            setDetecting(true);
            setDetectMsg("Verbinde mit Gateway...");
            const gw = GATEWAY_TYPES.find(g => g.value === gateway.type);
            const baud = gw?.baud || 57600;
            const proto = gw?.proto || "auto";
            const result = await window.electronAPI.readBaseId(gateway.serial_path, baud, proto);
            setDetecting(false);
            if (result.ok && result.baseId) {
              setGateway(g => ({ ...g, base_id: result.baseId, serial_path: result.portPath || g.serial_path }));
              setDetectMsg(`✓ Base-ID erkannt: ${result.baseId} (${result.protocol || proto}, ${result.baudRate || baud} baud${result.bridge ? ", " + result.bridge : ""})`);
            } else if (result.ok && (result.gatewayType === "fgw14usb" || result.detectedWithoutBaseId)) {
              setGateway(g => ({ ...g, type:"fgw14usb", serial_path: result.portPath || g.serial_path }));
              setDetectMsg(`✓ FGW14-USB erkannt auf ${result.portPath || gateway.serial_path}. Die Base-ID bitte aus PCT14 übernehmen oder manuell eintragen.`);
            } else {
              setDetectMsg("✗ " + result.error);
            }
            setTimeout(() => setDetectMsg(""), 12000);
          };'''
          app = replace_region(
              app,
              '  const handleDetectBaseId = async () => {',
              '\n\n  const handleAutoDetectGateway',
              detect_base,
              'handleDetectBaseId',
          )

          auto_detect = '''  const handleAutoDetectGateway = async () => {
            if (!isElectron) return;
            setDetecting(true);
            setDetectMsg("Suche Gateway auf allen seriellen Ports...");
            const result = await window.electronAPI.detectGateway(gateway.serial_path);
            setDetecting(false);

            if (result.ports) setPorts(result.ports);

            if (result.ok) {
              const gw = result.gateway;
              setGateway(g => ({
                ...g,
                type: gw.type,
                serial_path: gw.serial_path,
                base_id: gw.base_id || g.base_id,
              }));
              const baseText = gw.base_id ? `, Base-ID ${gw.base_id}` : "";
              const baseHint = gw.type === "fgw14usb" && !gw.base_id
                ? " · Base-ID bitte aus PCT14 übernehmen oder manuell eintragen."
                : "";
              setDetectMsg(`✓ Gateway erkannt: ${gw.label} auf ${gw.serial_path}${baseText} (${gw.protocol}, ${gw.baudRate} baud${result.bridge ? ", " + result.bridge : ""})${baseHint}`);
            } else {
              const tried = result.attempts?.length ? ` Getestete Varianten: ${result.attempts.length}.` : "";
              setDetectMsg("✗ " + result.error + tried);
            }
            setTimeout(() => setDetectMsg(""), 12000);
          };'''
          app = replace_region(
              app,
              '  const handleAutoDetectGateway = async () => {',
              '\n\n  const handleDisconnectGateway',
              auto_detect,
              'handleAutoDetectGateway',
          )

          app = replace_once(
              app,
              'Testet erkannte Ports. FAM14 wird über Python/eltakobus erkannt; manuell eingetragener COM-Port wird zuerst getestet. Vor dem Abziehen oder Wechseln eines FAM14/FGW14-USB bitte Disconnect ausführen.',
              'Testet alle erkannten seriellen Ports. Ein manuell eingetragener COM-Port wird zuerst geprüft. Vor dem Abziehen oder Wechseln eines FAM14 oder FGW14-USB bitte „Disconnect / Bus freigeben“ ausführen.',
              'Gateway-Hinweis',
          )
          app = replace_once(
              app,
              '{detecting ? "Lese Base ID..." : "Base ID auslesen"}',
              '{detecting ? (gateway.type==="fgw14usb" ? "Prüfe Gateway..." : "Lese Base ID...") : (gateway.type==="fgw14usb" ? "Gateway prüfen" : "Base ID auslesen")}',
              'Gateway-Prüfbutton',
          )
          app = replace_once(
              app,
              '{isElectron ? "Automatisch vom Gateway auslesen" : "Steht auf der Rückseite des Geräts"}',
              '{isElectron ? (gateway.type==="fgw14usb" ? "Gateway prüfen; Base-ID aus PCT14 übernehmen oder manuell eintragen" : "Automatisch vom Gateway auslesen") : "Steht auf der Rückseite des Geräts"}',
              'Base-ID-Hinweis',
          )
          app = replace_once(
              app,
              '<div>Privat entwickelt von Denis Zirnbauer · Kein offizielles Produkt der ELTAKO GmbH</div>',
              '<div>Developed by D. Zirnbauer · Not an official product of ELTAKO GmbH</div>',
              'Footer',
          )
          write(app_path, app)

          # ----------------------------------------------------------
          # Electron-Hauptprozess
          # ----------------------------------------------------------
          main_path = 'electron/main.js'
          main = read(main_path)

          crc_start = main.find('const CRC8_TABLE = [')
          crc_end_marker = 'function crc8(data) { let c=0; for(const b of data) c=CRC8_TABLE[c^b]; return c; }\n\n'
          crc_end = main.find(crc_end_marker, crc_start)
          if crc_start >= 0 and crc_end >= 0:
              main = main[:crc_start] + main[crc_end + len(crc_end_marker):]

          esp3_builder_start = main.find('// PROTOCOL 2: Standard ESP3 CO_RD_IDBASE')
          esp2_builder_start = main.find('// PROTOCOL 3: Standard ESP2 CO_RD_IDBASE', esp3_builder_start)
          if esp3_builder_start >= 0 and esp2_builder_start >= 0:
              comment_start = main.rfind('// ─', 0, esp3_builder_start)
              main = main[:comment_start] + main[esp2_builder_start:].replace('// PROTOCOL 3:', '// PROTOCOL 2:', 1)

          esp3_parser_start = main.find('// Parse ESP3 CO_RD_IDBASE response')
          serial_helpers_start = main.find('// SERIAL READ / AUTO DETECT HELPERS', esp3_parser_start)
          if esp3_parser_start >= 0 and serial_helpers_start >= 0:
              divider_start = main.rfind('// ─', 0, serial_helpers_start)
              main = main[:esp3_parser_start] + main[divider_start:]

          main = main.replace("  const esp3 = tryParseEsp3(buffer);\n  if (esp3) return { baseId: esp3, parser: 'esp3' };\n\n", '')
          main = main.replace("  if (protocol === 'esp3') return buildEsp3RdIdBase();\n", '')
          main = main.replace("  if (candidate.protocol === 'esp3') return 'usb300';\n", '')
          main = re.sub(
              r"\n  if \(m\.includes\('enocean'\) \|\| m\.includes\('usb'\) \|\| m\.includes\('serial'\) \|\| m\.includes\('com'\)\) \{\n    add\(57600, 'esp3', 'EnOcean USB300 \(ESP3 -> ESP2 Adapter\)'\);\n  \}\n",
              '\n',
              main,
              count=1,
          )
          main = main.replace("  add(57600, 'esp3', 'EnOcean USB300 (ESP3 -> ESP2 Adapter)');\n", '')

          read_handler = '''ipcMain.handle('read-base-id', async (_, portPath, baudRate, protocol) => {
            const proto = protocol || 'esp2';

            if (proto === 'fam14-python' || proto === 'eltakobus-fam14' || proto === 'fam-usb-python' || proto === 'eltakobus-fam-usb' || proto === 'fgw14-python') {
              const isFamUsb = proto === 'fam-usb-python' || proto === 'eltakobus-fam-usb';
              const isFgw14 = proto === 'fgw14-python';
              const detectorMode = isFgw14 ? 'fgw14' : (isFamUsb ? 'fam-usb' : 'fam14');
              const expectedType = isFgw14 ? 'fgw14usb' : (isFamUsb ? 'fam-usb' : 'fam14');
              const py = await runPythonDetector(portPath || '', detectorMode);

              if (py.ok && py.gateway) {
                const detectedType = py.gateway.type || expectedType;
                rememberBusConnection(py.gateway.serial_path || portPath, detectedType, py.gateway.baudRate || 57600);

                if (py.gateway.base_id) {
                  return {
                    ok: true,
                    baseId: py.gateway.base_id,
                    gatewayType: detectedType,
                    protocol: py.gateway.protocol,
                    parser: py.gateway.parser,
                    baudRate: py.gateway.baudRate,
                    portPath: py.gateway.serial_path,
                    bridge: 'python',
                  };
                }

                if (detectedType === 'fgw14usb') {
                  return {
                    ok: true,
                    baseId: '',
                    gatewayType: 'fgw14usb',
                    detectedWithoutBaseId: true,
                    protocol: py.gateway.protocol,
                    parser: py.gateway.parser,
                    baudRate: py.gateway.baudRate,
                    portPath: py.gateway.serial_path,
                    bridge: 'python',
                  };
                }
              }

              return {
                ok: false,
                error: py.error || (isFgw14
                  ? 'FGW14-USB konnte auf dem angegebenen Port nicht erkannt werden.'
                  : (isFamUsb ? 'FAM-USB-Erkennung lieferte keine Base-ID.' : 'FAM14-Erkennung lieferte keine Base-ID.')),
                attempts: py.attempts || [],
                bridge: 'python',
              };
            }

            const result = await readBaseIdFromPort(portPath, baudRate || 57600, proto, { timeoutMs: 1800, retries: 3 });
            if (result.ok) return result;
            return {
              ok: false,
              error: `${result.error}\nPort: ${portPath}\nBaudrate: ${baudRate || 57600}\nProtokoll: ${proto}`,
              txFrames: result.txFrames || [],
              rxFrames: result.rxFrames || [],
            };
          });'''
          main = replace_region(
              main,
              "ipcMain.handle('read-base-id'",
              "\n\nipcMain.handle('detect-gateway'",
              read_handler,
              'read-base-id IPC',
          )
          main = main.replace(
              "const code = 'import serial, yaml, eltakobus, esp2_gateway_adapter; print(\"ok\")';",
              "const code = 'import serial, yaml, eltakobus; print(\"ok\")';",
          )
          write(main_path, main)

          # ----------------------------------------------------------
          # Python-Gateway-Erkennung
          # ----------------------------------------------------------
          detector_path = 'python/detect_gateway.py'
          detector = read(detector_path)

          try_rs485 = '''async def try_rs485_port(port_path: str, baud_rate: int, target: str = "auto") -> Dict[str, Any]:
              from eltakobus.serial import RS485SerialInterfaceV2

              bus = None
              try:
                  log("try RS485", port_path, baud_rate, "target=", target)
                  bus = RS485SerialInterfaceV2(
                      port_path,
                      baud_rate=baud_rate,
                      delay_message=0.2,
                      auto_reconnect=False,
                  )
                  bus.start()
                  bus.is_serial_connected.wait(timeout=2)

                  if not bus.is_active():
                      return {"ok": False, "error": "Port geöffnet, aber RS485-Schnittstelle nicht aktiv"}

                  suppress_echo = bool(getattr(bus, "suppress_echo", False))
                  log("RS485 active", port_path, baud_rate, "suppress_echo=", suppress_echo)

                  if suppress_echo:
                      if target in ("fam-usb", "fgw14"):
                          return {"ok": False, "error": "Port verhält sich wie FAM14 (suppress_echo)."}
                      base_id = await asyncio.wait_for(get_fam14_base_id(bus), timeout=8)
                      if base_id:
                          return {
                              "ok": True,
                              "gateway": {
                                  "type": "fam14",
                                  "label": "Eltako FAM14",
                                  "serial_path": port_path,
                                  "baudRate": baud_rate,
                                  "protocol": "eltakobus-fam14",
                                  "parser": "python-eltakobus-create_busobject-255",
                                  "base_id": base_id,
                              },
                          }
                      return {"ok": False, "error": "FAM14 erkannt, aber Base-ID konnte nicht gelesen werden"}

                  if baud_rate == 9600 and target in ("auto", "fam-usb", "rs485"):
                      base_id = await asyncio.wait_for(get_fam_usb_base_id(bus), timeout=5)
                      if base_id:
                          return {
                              "ok": True,
                              "gateway": {
                                  "type": "fam-usb",
                                  "label": "Eltako FAM-USB",
                                  "serial_path": port_path,
                                  "baudRate": baud_rate,
                                  "protocol": "eltakobus-fam-usb-ab58",
                                  "parser": "python-eltakobus-exchange-ab58",
                                  "base_id": base_id,
                              },
                          }

                  if baud_rate == 57600 and target in ("auto", "fgw14", "rs485"):
                      return {
                          "ok": True,
                          "gateway": {
                              "type": "fgw14usb",
                              "label": "Eltako FGW14-USB",
                              "serial_path": port_path,
                              "baudRate": baud_rate,
                              "protocol": "eltakobus-rs485-no-suppress-echo",
                              "parser": "python-eltakobus-rs485-no-suppress-echo",
                              "base_id": "",
                          },
                      }

                  return {"ok": False, "error": "Keine passende ELTAKO-Gateway-Antwort"}

              except Exception as exc:
                  return {"ok": False, "error": f"{type(exc).__name__}: {exc}"}
              finally:
                  if bus is not None:
                      try:
                          bus.stop()
                          bus.join(0.8)
                      except Exception:
                          pass
          '''
          detector = replace_region(
              detector,
              'async def try_rs485_port(',
              '\n\nasync def try_esp3_port(',
              try_rs485.rstrip(),
              'try_rs485_port',
          )
          detector = replace_region(
              detector,
              '\n\nasync def try_esp3_port(',
              '\n\nasync def detect(',
              '',
              'try_esp3_port entfernen',
          )

          detect_function = '''async def detect(preferred_path: str = "", mode: str = "auto") -> Dict[str, Any]:
              ports = list_ports(preferred_path)
              attempts: List[Dict[str, Any]] = []

              if not ports:
                  return {"ok": False, "ports": [], "attempts": [], "error": "Kein serieller Port gefunden"}

              for port_info in ports:
                  port_path = port_info["path"]
                  if mode == "auto":
                      candidates = [(9600, "auto"), (57600, "auto")]
                  elif mode == "fam-usb":
                      candidates = [(9600, "fam-usb")]
                  elif mode == "fam14":
                      candidates = [(57600, "fam14"), (9600, "fam14")]
                  elif mode == "fgw14":
                      candidates = [(57600, "fgw14")]
                  else:
                      candidates = [(9600, "rs485"), (57600, "rs485")]

                  for baud_rate, target in candidates:
                      result = await try_rs485_port(port_path, baud_rate, target)
                      attempts.append({
                          "path": port_path,
                          "manufacturer": port_info.get("manufacturer", ""),
                          "description": port_info.get("description", ""),
                          "protocol": "rs485",
                          "baudRate": baud_rate,
                          "ok": result.get("ok", False),
                          "error": result.get("error", ""),
                      })

                      if result.get("ok"):
                          gateway = result["gateway"]
                          gateway["manufacturer"] = port_info.get("manufacturer", "")
                          gateway["description"] = port_info.get("description", "")
                          return {"ok": True, "gateway": gateway, "ports": ports, "attempts": attempts}

              return {
                  "ok": False,
                  "ports": ports,
                  "attempts": attempts,
                  "error": "Ports wurden getestet, aber kein unterstütztes ELTAKO-Gateway erkannt. Prüfe COM-Port, Baudrate und ob PCT14 oder eine andere Software den Port belegt.",
              }
          '''
          detector = replace_region(
              detector,
              'async def detect(',
              '\n\nasync def main(',
              detect_function.rstrip(),
              'detect',
          )
          detector = detector.replace(
              'choices=["auto", "fam14", "fam-usb", "rs485", "esp3"]',
              'choices=["auto", "fam14", "fam-usb", "fgw14", "rs485"]',
          )
          write(detector_path, detector)

          # ----------------------------------------------------------
          # Lerntelegramm-Listener
          # ----------------------------------------------------------
          learn_path = 'python/learn_device_id.py'
          learn = read(learn_path)
          usb_listener_start = learn.find('\ndef listen_usb300(')
          main_start = learn.find('\ndef main() -> int:', usb_listener_start)
          if usb_listener_start >= 0 and main_start >= 0:
              learn = learn[:usb_listener_start] + learn[main_start:]

          new_main = '''def main() -> int:
              parser = argparse.ArgumentParser()
              parser.add_argument("--port", required=True)
              parser.add_argument("--mode", default="auto")
              parser.add_argument("--timeout", type=float, default=20.0)
              args = parser.parse_args()

              mode = (args.mode or "auto").lower().strip()
              if mode in ("fam14", "fgw14usb", "fgw14", "auto"):
                  mode = "fam14"
              elif mode in ("fam-usb", "famusb"):
                  mode = "fam-usb"

              try:
                  result = listen_rs485(args.port, mode, args.timeout)
              except Exception as exc:
                  log("fatal", repr(exc))
                  import traceback
                  traceback.print_exc(file=sys.stderr)
                  result = {"ok": False, "error": f"Python-Lerntelegramm-Listener fehlgeschlagen: {type(exc).__name__}: {exc}"}

              print(json.dumps(result, ensure_ascii=False), flush=True)
              return 0 if result.get("ok") else 1


          if __name__ == "__main__":
              raise SystemExit(main())
          '''
          learn = replace_region(
              learn,
              'def main() -> int:',
              '\n\nif __name__ == "__main__":',
              new_main.rstrip().rsplit('\n\nif __name__ == "__main__":', 1)[0],
              'learn main',
          )
          if '__main__' not in learn:
              learn += '\n\nif __name__ == "__main__":\n    raise SystemExit(main())\n'
          else:
              learn = re.sub(
                  r'\n\nif __name__ == "__main__":.*\Z',
                  '\n\nif __name__ == "__main__":\n    raise SystemExit(main())\n',
                  learn,
                  count=1,
                  flags=re.DOTALL,
              )
          write(learn_path, learn)

          # ----------------------------------------------------------
          # Abhängigkeiten, README, Changelog
          # ----------------------------------------------------------
          requirements_path = 'python/requirements.txt'
          requirements = '\n'.join(
              line for line in read(requirements_path).splitlines()
              if 'esp2-gateway-adapter' not in line.lower()
          ) + '\n'
          write(requirements_path, requirements)

          notices_path = 'THIRD_PARTY_NOTICES.md'
          notices = '\n'.join(
              line for line in read(notices_path).splitlines()
              if 'esp2-gateway-adapter' not in line.lower()
          ) + '\n'
          write(notices_path, notices)

          readme_path = 'README.md'
          readme = read(readme_path)
          readme = replace_once(
              readme,
              '- FAM14-, FAM-USB-, FGW14-USB- und EnOcean-USB300-Unterstützung\n- automatische Gateway- und Base-ID-Erkennung\n- USB300 experimentell über Python EnOcean und `esp2_gateway_adapter` (ESP3-Hardware mit ESP2-Funktionsumfang)',
              '- Unterstützung für Eltako FAM-USB, FAM14 und FGW14-USB\n- automatische Gateway-Erkennung für die drei unterstützten ELTAKO-Gateways\n- Base-ID-Auslesen bei FAM-USB und FAM14; beim FGW14-USB aus PCT14 übernehmen oder manuell eintragen',
              'README Gateway-Liste',
          )
          release_start = readme.find('## GitHub-Veröffentlichung')
          structure_start = readme.find('## Projektstruktur', release_start)
          if release_start >= 0 and structure_start >= 0:
              release_text = '''## GitHub-Veröffentlichung

          Das Repository enthält den GitHub-Actions-Workflow `.github/workflows/build-windows.yml`.

          - Jeder Push auf `main` baut automatisch den Windows-Installer.
          - Installer und SHA-256-Prüfsumme stehen im erfolgreichen Workflow-Lauf unter **Artifacts** bereit.
          - GitHub Releases werden manuell erstellt und mit dem geprüften Installer ergänzt.

          '''
              readme = readme[:release_start] + release_text + readme[structure_start:]
          write(readme_path, readme)

          changelog_path = 'CHANGELOG.md'
          changelog = read(changelog_path)
          if '## 1.0.82' not in changelog:
              entry = '''## 1.0.82

          - EnOcean USB300 vollständig aus Auswahl, Erkennung und Laufzeitabhängigkeiten entfernt, da aktuell kein praktischer Test möglich ist.
          - FGW14-USB-Erkennung an das Verfahren des EnOcean Device Managers angepasst: 57600 Baud und aktive RS485-Schnittstelle ohne Echo-Unterdrückung.
          - FGW14-USB kann ohne Base-ID-Antwort erkannt werden; die Base-ID wird aus PCT14 übernommen oder manuell eingetragen.
          - Gateway-Hinweis neutral formuliert und technische Implementierungsdetails aus der Oberfläche entfernt.
          - Footer auf „Developed by D. Zirnbauer · Not an official product of ELTAKO GmbH“ geändert.

          '''
              changelog = changelog.replace('# Changelog\n\n', '# Changelog\n\n' + entry, 1)
          write(changelog_path, changelog)

          # Vollständigen Namen in aktuellen Textdateien kürzen.
          text_suffixes = {'.js', '.jsx', '.json', '.md', '.py', '.yml', '.yaml', '.txt', '.nsh', '.cmd', '.ps1'}
          tracked = subprocess.check_output(['git', 'ls-files', '-z']).decode('utf-8').split('\0')
          for item in tracked:
              if not item or item.startswith('.github/workflows/'):
                  continue
              file_path = ROOT / item
              if not file_path.is_file() or file_path.suffix.lower() not in text_suffixes:
                  continue
              try:
                  current = file_path.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  continue
              updated = current.replace('Denis Zirnbauer', 'D. Zirnbauer')
              if updated != current:
                  file_path.write_text(updated, encoding='utf-8', newline='\n')
                  print(f'updated author in {item}')

          # ----------------------------------------------------------
          # Validierung
          # ----------------------------------------------------------
          app = read(app_path)
          block_start = app.find('const GATEWAY_TYPES = [')
          block_end = app.find('\n];', block_start)
          values = re.findall(r'value:"([^"]+)"', app[block_start:block_end])
          if values != ['fam-usb', 'fam14', 'fgw14usb']:
              raise RuntimeError(f'Unerwartete Gateway-Liste: {values}')
          if 'proto:"fgw14-python"' not in app[block_start:block_end]:
              raise RuntimeError('FGW14-Protokoll fehlt')
          if 'Developed by D. Zirnbauer · Not an official product of ELTAKO GmbH' not in app:
              raise RuntimeError('Footer fehlt')
          if 'const APP_VERSION = "1.0.82";' not in app:
              raise RuntimeError('APP_VERSION ist nicht 1.0.82')

          current_support_files = [
              'src/App.jsx',
              'electron/main.js',
              'python/detect_gateway.py',
              'python/learn_device_id.py',
              'python/requirements.txt',
              'README.md',
              'THIRD_PARTY_NOTICES.md',
          ]
          for filename in current_support_files:
              current = read(filename).lower()
              if 'usb300' in current or 'esp2_gateway_adapter' in current or 'esp2-gateway-adapter' in current:
                  raise RuntimeError(f'USB300/Adapter noch enthalten: {filename}')

          print('Source patch completed successfully')
          PY

          python /tmp/prepare_v1082.py
          npm version 1.0.82 --no-git-tag-version --allow-same-version

      - name: Syntax und Quellen prüfen
        shell: bash
        run: |
          python -m py_compile python/detect_gateway.py python/learn_device_id.py
          node --check electron/main.js
          python - <<'PY'
          import json
          from pathlib import Path
          package = json.loads(Path('package.json').read_text(encoding='utf-8'))
          lock = json.loads(Path('package-lock.json').read_text(encoding='utf-8'))
          assert package['version'] == '1.0.82', package['version']
          assert lock['version'] == '1.0.82', lock['version']
          assert lock['packages']['']['version'] == '1.0.82', lock['packages']['']['version']
          print('Versionen und JSON sind korrekt.')
          PY
          git diff --check

      - name: Abhängigkeiten installieren
        shell: bash
        run: |
          npm config set registry https://registry.npmjs.org/
          npm ci --include=dev --no-audit --no-fund

      - name: Frontend bauen
        run: npm run build

      - name: v1.0.82 committen und Hilfsworkflows entfernen
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/prepare-v1.0.82.yml .github/workflows/fix-prepare-v1.0.82.yml .github/workflows/finalize-v1.0.82.yml
          git add -A
          git commit -m "Build EEDTOY v1.0.82"
          git push origin main

  build-windows:
    needs: prepare
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Aktualisierten Stand auschecken
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Abhängigkeiten installieren
        shell: pwsh
        run: |
          npm config set registry https://registry.npmjs.org/
          npm ci --include=dev --no-audit --no-fund

      - name: Version kontrollieren
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ($version -ne '1.0.82') {
            throw "Falsche Version im Build: $version"
          }
          Write-Host "Baue EEDTOY $version"

      - name: Windows-Installer bauen
        run: npm run build:installer

      - name: SHA-256-Prüfsumme erstellen
        shell: pwsh
        run: |
          Remove-Item dist-exe/SHA256SUMS.txt -ErrorAction SilentlyContinue
          Get-ChildItem dist-exe -Filter *.exe | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)" | Add-Content -Encoding utf8 dist-exe/SHA256SUMS.txt
          }

      - name: Installer hochladen
        uses: actions/upload-artifact@v4
        with:
          name: EEDTOY-Windows-v1.0.82
          path: |
            dist-exe/EEDTOY-Setup-1.0.82.exe
            dist-exe/EEDTOY-Setup-1.0.82.exe.blockmap
            dist-exe/SHA256SUMS.txt
          if-no-files-found: error
