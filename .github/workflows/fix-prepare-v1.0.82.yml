name: Fix EEDTOY v1.0.82 preparation

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fix-prepare-v1.0.82.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Vorbereitungsskript korrigieren
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('.github/workflows/prepare-v1.0.82.yml')
          text = path.read_text(encoding='utf-8')

          pattern = re.compile(
              r"          old_auto_success = '''.*?          text = replace_required\(text, old_auto_success, new_auto_success, 'Auto-Detect Erfolgsanzeige'\)\n",
              re.DOTALL,
          )

          replacement = r'''          new_auto_success = '''    if (result.ok) {
              const gw = result.gateway;
              setGateway(g => ({
                ...g,
                type: gw.type,
                serial_path: gw.serial_path,
                base_id: gw.base_id || g.base_id,
              }));
              const baseText = gw.base_id ? `, Base-ID ${gw.base_id}` : "";
              const baseHint = gw.type === "fgw14usb" && !gw.base_id
                ? " · Base-ID bitte aus PCT14 übernehmen oder manuell eintragen."
                : "";
              setDetectMsg(`✓ Gateway erkannt: ${gw.label} auf ${gw.serial_path}${baseText} (${gw.protocol}, ${gw.baudRate} baud${result.bridge ? ", " + result.bridge : ""})${baseHint}`);
            } else {'''
          text = sub_required(
              text,
              r'(?<=    if \(result\.ports\) setPorts\(result\.ports\);\n\n)    if \(result\.ok\) \{\n.*?\n    \} else \{',
              new_auto_success,
              'Auto-Detect Erfolgsanzeige',
              flags=re.DOTALL,
          )
'''

          updated, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'Vorbereitungsmuster konnte nicht korrigiert werden: {count}')

          path.write_text(updated, encoding='utf-8', newline='\n')
          print('Auto-Detect-Suchmuster wurde robust gemacht.')
          PY

      - name: Hilfsworkflow entfernen und Änderung committen
        shell: bash
        run: |
          git rm .github/workflows/fix-prepare-v1.0.82.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/prepare-v1.0.82.yml
          git commit -m "Fix v1.0.82 preparation pattern"
          git push origin main
