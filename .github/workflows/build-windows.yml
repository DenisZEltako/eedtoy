name: Build Windows Installer

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci --include=dev

      - name: Build-Werkzeuge prüfen
        run: npx vite --version

      - name: Frontend prüfen
        run: npm run build

      - name: Windows-Installer bauen
        run: npm run build:installer

      - name: SHA-256-Prüfsummen erstellen
        shell: pwsh
        run: |
          Remove-Item dist-exe/SHA256SUMS.txt -ErrorAction SilentlyContinue
          Get-ChildItem dist-exe -Filter *.exe | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)" | Add-Content -Encoding utf8 dist-exe/SHA256SUMS.txt
          }

      - name: Build-Artefakte hochladen
        uses: actions/upload-artifact@v4
        with:
          name: EEDTOY-Windows-${{ github.ref_name }}
          path: |
            dist-exe/*.exe
            dist-exe/*.blockmap
            dist-exe/SHA256SUMS.txt
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Build-Artefakte herunterladen
        uses: actions/download-artifact@v4
        with:
          name: EEDTOY-Windows-${{ github.ref_name }}
          path: release

      - name: GitHub Release erstellen
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" release/* --generate-notes --verify-tag
