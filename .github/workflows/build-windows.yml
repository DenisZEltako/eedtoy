name: Build Windows Installer

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Abhaengigkeiten installieren
        run: npm ci

      - name: Frontend pruefen
        run: npm run build

      - name: Windows-Installer bauen
        run: npm run build:installer

      - name: Installer als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: EEDTOY-Windows-${{ github.ref_name }}
          path: dist-exe/*.exe
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Installer herunterladen
        uses: actions/download-artifact@v4
        with:
          name: EEDTOY-Windows-${{ github.ref_name }}
          path: release

      - name: GitHub Release erstellen
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" release/*.exe --generate-notes --verify-tag
