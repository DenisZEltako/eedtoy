name: Build EEDTOY for Windows

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Abhängigkeiten installieren
        shell: pwsh
        run: |
          npm config set registry https://registry.npmjs.org/
          npm ci --include=dev --no-audit --no-fund

      - name: Windows-Installer bauen
        run: npm run build:installer

      - name: SHA-256-Prüfsumme erstellen
        shell: pwsh
        run: |
          Get-ChildItem dist-exe -Filter *.exe | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)" | Add-Content -Encoding utf8 dist-exe/SHA256SUMS.txt
          }

      - name: Installer als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: EEDTOY-Windows
          path: |
            dist-exe/*.exe
            dist-exe/*.blockmap
            dist-exe/SHA256SUMS.txt
          if-no-files-found: error
